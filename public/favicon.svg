<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Controller body -->
  <rect x="8" y="28" width="84" height="48" rx="24" ry="24" fill="#0a0a0f" stroke="#00f5ff" stroke-width="3.5"/>
  <!-- Left grip -->
  <rect x="4" y="52" width="26" height="30" rx="13" fill="#0a0a0f" stroke="#00f5ff" stroke-width="3.5"/>
  <!-- Right grip -->
  <rect x="70" y="52" width="26" height="30" rx="13" fill="#0a0a0f" stroke="#00f5ff" stroke-width="3.5"/>
  <!-- D-pad horizontal -->
  <rect x="20" y="42" width="20" height="7" rx="2" fill="#00f5ff"/>
  <!-- D-pad vertical -->
  <rect x="27" y="35" width="7" height="20" rx="2" fill="#00f5ff"/>
  <!-- Action buttons -->
  <circle cx="70" cy="38" r="4" fill="#ff0080"/>
  <circle cx="80" cy="48" r="4" fill="#00f5ff"/>
  <circle cx="60" cy="48" r="4" fill="#00ff88"/>
  <circle cx="70" cy="58" r="4" fill="#ffff00"/>
  <!-- Center start/select -->
  <rect x="41" y="47" width="8" height="5" rx="2" fill="#00f5ff" opacity="0.6"/>
  <rect x="52" y="47" width="8" height="5" rx="2" fill="#00f5ff" opacity="0.6"/>
  <!-- Shoulder buttons -->
  <rect x="16" y="24" width="22" height="7" rx="4" fill="none" stroke="#00f5ff" stroke-width="2.5"/>
  <rect x="62" y="24" width="22" height="7" rx="4" fill="none" stroke="#00f5ff" stroke-width="2.5"/>
</svg>
